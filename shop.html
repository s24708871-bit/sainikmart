<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Shop 500+ packed grocery products at SainikMart. Snacks, beverages, dairy, spices, oils & more. Cash on Delivery available."/>
  <title>Shop — SainikMart</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>

<nav class="navbar">
  <div class="nav-container">
    <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer">
      <span class="logo-sainik">Sainik</span><span class="logo-mart">Mart</span>
    </div>
    <div class="nav-links" id="navLinks">
      <a href="index.html">Home</a>
      <a href="shop.html" class="active">Shop</a>
      <a href="about.html">About Us</a>
      <a href="contact.html">Contact</a>
    </div>
    <div class="nav-actions">
      <button class="cart-btn" onclick="window.location.href='cart.html'">
        <i class="fas fa-shopping-cart"></i>
        <span class="cart-count" id="cartCount">0</span>
      </button>
      <button class="hamburger" id="hamburger"><i class="fas fa-bars"></i></button>
    </div>
  </div>
</nav>

<div class="page-hero">
  <h1>Our Products</h1>
  <p>Browse 500+ quality packed grocery products</p>
</div>

<section class="shop-section">
  <div class="container">
    <div class="shop-controls">
      <input type="text" id="searchBar" class="search-bar" placeholder="🔍 Search products..."/>
      <select id="catFilter" class="filter-select"></select>
      <span class="results-count" id="resultsCount"></span>
    </div>
    <div class="product-grid" id="shopGrid"></div>
  </div>
</section>

<a href="https://wa.me/919876543210?text=Hi%20SainikMart!%20I%20want%20to%20place%20an%20order." class="whatsapp-btn" target="_blank">
  <i class="fab fa-whatsapp"></i><span>Order on WhatsApp</span>
</a>

<footer class="footer">
  <div class="container">
    <div class="footer-bottom"><p>© 2026 SainikMart. All rights reserved.</p></div>
  </div>
</footer>

<script src="js/products.js"></script>
<script src="js/main.js"></script>
</body>
</html>
